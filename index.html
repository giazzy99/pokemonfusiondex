<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FusionDex 2.1</title>

<link rel="icon" href="Pika.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#0b2a4a;
font-family:'Press Start 2P',cursive;
}

/* HEADER */
.pokedex-header{
background:linear-gradient(135deg,#aa0000,#ff0000);
height:90px;
display:flex;
align-items:center;
justify-content:center;
border-bottom:4px solid #660000;
}
.pokedex-header h1{
color:white;
font-size:18px;
text-shadow:3px 3px 0 #660000;
}

/* ===== CONTROLS AREA ===== */

.controls-wrapper{
position:relative;
background:white;
padding:30px 0;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* TYPE DECORATIONS */
.type-decoration{
position:absolute;
display:flex;
flex-direction:column;
gap:12px;
font-size:11px;
opacity:0.15;
font-weight:bold;
}

.left-types{ left:20px; }
.right-types{ right:20px; }

.type-decoration span{
display:block;
}

/* CONTROLS */
.controls{
position:relative;
display:flex;
gap:15px;
z-index:2;
}

.controls input,
.controls select{
padding:10px;
font-family:'Press Start 2P';
font-size:10px;
border:3px solid #cc0000;
background:white;
}

/* GRID */
.card-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:40px;
justify-items:center;
}

/* CARD */
.card{
border-radius:10px;
border:4px solid #FFD700;
width:220px;
height:330px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:space-between;
padding:15px 10px;
position:relative;
cursor:pointer;
overflow:hidden;
transition:0.3s;
color:black;
}

.card:hover{
transform:scale(1.05);
}

/* Pokeball 50% */
.card::before{
content:"";
position:absolute;
width:180px;
height:180px;
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:linear-gradient(to bottom,
rgba(204,0,0,0.5) 50%,
rgba(255,255,255,0.5) 50%);
border:4px solid rgba(0,0,0,0.5);
z-index:0;
}

.card img{
width:180px;
max-height:170px;
object-fit:contain;
position:relative;
z-index:1;
}

.card h3,
.card h2{
position:relative;
z-index:1;
margin:6px 0;
text-align:center;
font-size:11px;
}

/* TYPE BADGE */
.type-badge{
padding:4px 8px;
border-radius:6px;
font-size:9px;
color:white;
display:inline-block;
margin:2px;
}

/* GLOW */
.glow{
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(5px);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
visibility:hidden;
transition:0.3s;
z-index:100;
}

.modal.active{
opacity:1;
visibility:visible;
}

.modal-content{
width:350px;
height:500px;
padding:20px;
border-radius:10px;
border:4px solid #FFD700;
text-align:center;
transform:scale(0.8);
transition:0.3s;
color:black;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.modal.active .modal-content{
transform:scale(1);
}

.modal-img{
width:200px;
margin:10px auto;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0);}
}

.close{
position:absolute;
right:20px;
top:10px;
cursor:pointer;
font-size:16px;
}

</style>
</head>

<body>

<header class="pokedex-header">
<h1>FusionDex 2.1</h1>
</header>

<div class="controls-wrapper">

<div class="type-decoration left-types">
<span>Acciaio</span>
<span>Acqua</span>
<span>Buio</span>
<span>Coleottero</span>
<span>Drago</span>
<span>Elettro</span>
<span>Erba</span>
<span>Folletto</span>
<span>Fuoco</span>
</div>

<div class="controls">
<input type="text" id="searchInput" placeholder="CERCA..." onkeyup="updateDisplay()">
<select id="sortSelect" onchange="updateDisplay()">
<option value="default">Filtra</option>
<option value="az">Alfabetico A-Z</option>
<option value="type">Per Tipo</option>
</select>
</div>

<div class="type-decoration right-types">
<span>Ghiaccio</span>
<span>Lotta</span>
<span>Normale</span>
<span>Psico</span>
<span>Roccia</span>
<span>Spettro</span>
<span>Terra</span>
<span>Veleno</span>
<span>Volante</span>
</div>

</div>

<div class="card-container" id="cardContainer"></div>

<div id="pokemonModal" class="modal" onclick="closeModal(event)">
<div class="modal-content glow" id="modalContent">
<span class="close" onclick="forceClose()">&times;</span>
<h2 id="modalTitle"></h2>
<img id="modalImage" class="modal-img">
<div id="modalTypes"></div>
<p id="modalDesc"></p>
</div>
</div>

<audio id="openSound" src="Ball.mp3"></audio>

<script>

const pokemonData = [
{number:"#001",name:"Alakazario",type:"Buio / Lotta",img:"Alakazario.png",desc:"..."},
{number:"#002",name:"Chapras",type:"Fuoco / Drago",img:"Chapras.png",desc:"..."},
{number:"#003",name:"Dorygon Z",type:"Psico / Ghiaccio",img:"Dorygon Z.png",desc:"..."},
{number:"#004",name:"Megarig",type:"Erba",img:"Megarig.png",desc:"..."},
{number:"#005",name:"Troparia",type:"Erba / Roccia",img:"Troparia.png",desc:"..."},
{number:"#006",name:"Girandoom",type:"Elettro",img:"Girandoom.png",desc:"..."},
{number:"#007",name:"Glizor",type:"Volante / Veleno",img:"Glizor.png",desc:"..."},
{number:"#008",name:"Lightyena",type:"Buio",img:"Lightyena.png",desc:"..."}
];

const typeColors = {
Normale:"#A8A878", Fuoco:"#F08030", Acqua:"#6890F0", Erba:"#78C850",
Elettro:"#F8D030", Ghiaccio:"#98D8D8", Lotta:"#C03028", Veleno:"#A040A0",
Terra:"#E0C068", Volante:"#A890F0", Psico:"#F85888", Coleottero:"#A8B820",
Roccia:"#B8A038", Spettro:"#705898", Drago:"#7038F8", Buio:"#705848",
Acciaio:"#B8B8D0", Folletto:"#EE99AC"
};

function createCards(data){
const container=document.getElementById("cardContainer");
container.innerHTML="";
data.forEach(pokemon=>{
let card=document.createElement("div");
card.className="card glow";
let firstType=pokemon.type.split("/")[0].trim();
let color1=typeColors[firstType];
card.style.background=`linear-gradient(135deg, ${color1}, white)`;
card.innerHTML=`
<h3>${pokemon.number}</h3>
<img src="${pokemon.img}">
<h2>${pokemon.name}</h2>
`;
card.onclick=()=>openModal(pokemon);
container.appendChild(card);
});
}

function openModal(pokemon){
const modal=document.getElementById("pokemonModal");
const content=document.getElementById("modalContent");

let firstType=pokemon.type.split("/")[0].trim();
let color1=typeColors[firstType];
content.style.background=`linear-gradient(135deg, ${color1}, white)`;

document.getElementById("modalTitle").innerText=
pokemon.number+" "+pokemon.name;
document.getElementById("modalImage").src=pokemon.img;
document.getElementById("modalDesc").innerText=pokemon.desc;

let typesDiv=document.getElementById("modalTypes");
typesDiv.innerHTML="";

pokemon.type.split("/").forEach((t,index)=>{
let type=t.trim();
let span=document.createElement("span");
span.className="type-badge";
span.style.background=typeColors[type];
span.innerText=type;
typesDiv.appendChild(span);

if(index===0 && pokemon.type.includes("/")){
let slash=document.createElement("span");
slash.innerText=" / ";
slash.style.color="black";
typesDiv.appendChild(slash);
}
});

document.getElementById("openSound").currentTime=0;
document.getElementById("openSound").play();

modal.classList.add("active");
}

function closeModal(e){
if(e.target.id==="pokemonModal"){
forceClose();
}
}

function forceClose(){
document.getElementById("pokemonModal").classList.remove("active");
}

function updateDisplay(){
let search=document.getElementById("searchInput").value.toLowerCase();
let sort=document.getElementById("sortSelect").value;

let filtered=pokemonData.filter(p=>
p.name.toLowerCase().includes(search) ||
p.number.toLowerCase().includes(search) ||
p.type.toLowerCase().includes(search) ||
p.desc.toLowerCase().includes(search)
);

if(sort==="az"){
filtered.sort((a,b)=>a.name.localeCompare(b.name));
}
if(sort==="type"){
filtered.sort((a,b)=>a.type.localeCompare(b.type));
}

createCards(filtered);
}

createCards(pokemonData);

</script>

</body>
</html>
